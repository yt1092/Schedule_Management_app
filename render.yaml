services:
  - type: web
    name: schedule-management-app
    env: python
    pythonVersion: 3.11
    rootDir: app
    buildCommand: cd ../frontend && rm -f src/APP.css && npm install && npm run build && cd ../app && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
